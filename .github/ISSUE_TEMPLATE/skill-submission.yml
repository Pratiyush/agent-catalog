name: Skill Submission
description: Submit a new skill to the marketplace
labels: ["skill-submission"]
body:
  - type: input
    id: name
    attributes:
      label: Skill name
      description: "Lowercase, hyphens only (e.g., code-review)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What does this skill do? When should agents use it?"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - skill
        - prompt
        - agent
        - mcp
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Script language
      description: "Primary language for scripts (e.g., JavaScript, Python)"
  - type: textarea
    id: checklist
    attributes:
      label: Submission checklist
      value: |
        - [ ] SKILL.md has valid frontmatter (name, description)
        - [ ] `skill validate` passes
        - [ ] `skill lint` passes
        - [ ] .skillignore excludes dev-only files
        - [ ] Scripts are executable and documented
